<section
  class="relative flex h-screen flex-col items-center justify-between overflow-hidden bg-[radial-gradient(circle_at_top,_#1e293b,_#020617_60%,_#000_100%)] px-6 py-6 sm:py-8 md:py-10 text-ce-text-main"
>
  <!-- Glow de fundo -->
  <div class="pointer-events-none absolute inset-0">
    <div
      class="absolute -top-40 left-1/2 h-96 w-96 -translate-x-1/2 rounded-full bg-emerald-500/20 blur-3xl"
    ></div>
  </div>

  <!-- Painel imersivo (topo, full-width) -->
  <aside
    class="relative z-10 mb-4 flex w-full max-w-3xl flex-col gap-4 rounded-2xl border p-6 shadow-[0_18px_60px_rgba(15,23,42,0.85)] backdrop-blur-md"
    [ngClass]="uiColors.border.subtleOpacity + ' ' + uiColors.background.surfaceElevated"
  >
      <!-- Título / texto -->
      <div class="space-y-2">
        <p
          class="text-xs font-semibold uppercase tracking-[0.25em] text-emerald-400/80"
        >
          Modo imersivo
        </p>
        <h1
          class="text-slate-50 sm:text-3xl"
          [ngClass]="uiTypography.heading.h1"
        >
          Viaje pelo mundo sem sair da sua cadeira.
        </h1>
        <p
          [ngClass]="uiTypography.body.base + ' ' + uiColors.text.secondary"
        >
          Explore países como se estivesse em um jogo: Visualize o globo, pesquise por países,
          descubra detalhes e encontre seu próximo destino favorito.
        </p>
      </div>

      <!-- Som ambiente -->
      <app-landing-ambient-audio></app-landing-ambient-audio>

      <!-- Botão listar países (abre modal) -->
      <div class="flex flex-wrap gap-3">
        <app-ui-button
          variant="primary"
          (clicked)="showCountriesModal.set(true)"
        >
          LISTAR PAÍSES
        </app-ui-button>
      </div>
    </aside>

  <!-- Globo central -->
  <div
    class="relative z-10 flex w-full flex-1 items-center justify-center pt-4"
  >
    <!-- Dica gamificada: setas piscando no topo; some só quando clicar/arrastar no globo e não volta mais -->
    <app-landing-drag-hint [visible]="!hintDismissed()" />

    <div
      class="relative aspect-square w-full max-w-[360px] rounded-full border border-emerald-500/15 bg-gradient-to-br from-slate-700 via-slate-900 to-black shadow-glow-emerald overflow-hidden sm:max-w-[420px] lg:max-w-[520px]"
      [class.animate-spin-slower]="!isInteracting()"
    >
      <!-- Globo 3D real -->
      <app-landing-globe-3d
        class="h-full w-full"
        [interacting]="isInteracting()"
        (globeInteract)="onGlobeInteraction()"
      ></app-landing-globe-3d>

      <!-- Atmosfera -->
      <div
        class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_30%_30%,rgba(34,197,94,0.25),transparent_55%),radial-gradient(circle_at_70%_60%,rgba(45,212,191,0.18),transparent_55%)] mix-blend-screen"
      ></div>
      <div
        class="pointer-events-none absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-white/5 mix-blend-soft-light"
      ></div>
    </div>

    <!-- Anel em órbita -->
    <div
      class="pointer-events-none absolute inset-x-6 bottom-10 top-auto rounded-full border border-emerald-500/10 lg:inset-x-24"
    ></div>
  </div>

  <!-- Modal: lista de países -->
  @if (showCountriesModal() && !showDetailModal()) {
    <app-ui-modal
      [isOpen]="true"
      title="Explorar países"
      (closed)="showCountriesModal.set(false)"
    >
      <app-country-list-modal-content (countrySelected)="onCountrySelected($any($event))" />
    </app-ui-modal>
  }

  <!-- Modal: detalhe do país (Voltar = volta para lista, X = volta para a landing) -->
  @if (showDetailModal()) {
    <app-ui-modal
      [isOpen]="true"
      [title]="detailModalTitle()"
      [showBackButton]="true"
      (backClicked)="onDetailBack()"
      (closed)="onDetailClosed()"
    >
      <app-country-detail-modal-content
        [code]="selectedCountryCode()"
        (titleChange)="detailModalTitle.set($event)"
      />
    </app-ui-modal>
  }
</section>
