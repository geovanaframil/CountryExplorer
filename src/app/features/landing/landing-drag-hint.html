@if (visible) {
  <div
    class="pointer-events-none absolute left-1/2 top-4 z-20 flex -translate-x-1/2 flex-col items-center gap-2 text-center"
    role="status"
    aria-live="polite"
  >
    <!-- Setas de jogo (esquerda / direita) piscando -->
    <div class="flex items-center gap-4 animate-blink">
      <span class="flex h-10 w-10 items-center justify-center rounded-lg border-2 border-emerald-400/80 bg-emerald-500/20 text-emerald-300" aria-hidden="true">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
        </svg>
      </span>
      <span class="text-xs font-semibold uppercase tracking-widest text-slate-200">
        Arraste para explorar
      </span>
      <span class="flex h-10 w-10 items-center justify-center rounded-lg border-2 border-emerald-400/80 bg-emerald-500/20 text-emerald-300" aria-hidden="true">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
        </svg>
      </span>
    </div>
    <p class="text-[11px] text-slate-400">
      Quando você se mover, a busca será ativada.
    </p>
  </div>
}
