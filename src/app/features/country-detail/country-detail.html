<div
  class="min-h-[60vh] flex items-center justify-center p-8"
  [ngClass]="uiColors.background.surfaceLightAlt"
>
  <div
    class="w-full max-w-3xl rounded-2xl shadow-md p-8"
    [ngClass]="uiColors.background.surfaceLight + ' ' + uiColors.border.subtleLight"
  >
    <div class="mb-6 flex items-center justify-between gap-4">
      <h1
        [ngClass]="uiTypography.heading.h2 + ' ' + uiColors.text.primaryLight"
      >
        Country Detail
      </h1>

      <button
        type="button"
        class="inline-flex items-center rounded-xl px-4 py-2 shadow-sm focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-offset-2"
        [ngClass]="uiColors.button.neutral + ' ' + uiTypography.actions.primary + ' focus-visible:ring-slate-900'"
      >
        Voltar
      </button>
    </div>

    <div class="grid gap-6 md:grid-cols-[1.3fr,auto] items-start">
      <!-- Coluna principal -->
      <div class="space-y-4">
        <h2
          [ngClass]="uiTypography.heading.h3 + ' ' + uiColors.text.primaryLight"
        >
          Nome do país
        </h2>

        <dl
          class="grid grid-cols-1 gap-3 sm:grid-cols-2"
          [ngClass]="uiTypography.body.base + ' ' + uiColors.text.secondaryLight"
        >
          <div class="space-y-1">
            <dt [ngClass]="uiColors.text.mutedLight + ' font-medium'">Capital</dt>
            <dd>Exemplo City</dd>
          </div>
          <div class="space-y-1">
            <dt [ngClass]="uiColors.text.mutedLight + ' font-medium'">Região</dt>
            <dd>Europa</dd>
          </div>
          <div class="space-y-1">
            <dt [ngClass]="uiColors.text.mutedLight + ' font-medium'">População</dt>
            <dd>10,5M</dd>
          </div>
          <div class="space-y-1">
            <dt [ngClass]="uiColors.text.mutedLight + ' font-medium'">Moeda</dt>
            <dd>Euro (EUR)</dd>
          </div>
        </dl>
      </div>

      <!-- Card lateral (ex: bandeira) -->
      <div class="mt-4 md:mt-0">
        <div
          class="overflow-hidden rounded-xl bg-slate-100"
          [ngClass]="uiColors.border.subtleLight"
        >
          <div
            class="aspect-video bg-gradient-to-br from-slate-200 to-slate-300 flex items-center justify-center"
          >
            <span
              [ngClass]="uiTypography.label.upperMuted + ' ' + uiColors.text.mutedLight"
            >
              Bandeira
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
