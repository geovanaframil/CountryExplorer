@if (isOpen()) {
  <div
    role="dialog"
    aria-modal="true"
    [attr.aria-labelledby]="title() ? 'modal-title' : null"
    class="fixed inset-0 z-50 flex items-center justify-center p-4"
  >
    <!-- Backdrop -->
    <div
      data-modal-backdrop="true"
      class="absolute inset-0 bg-black/70 backdrop-blur-sm transition-opacity"
      (click)="onBackdropClick($event)"
    ></div>

    <!-- Caixa do modal -->
    <div
      #dialog
      tabindex="-1"
      class="relative z-10 w-full max-h-[90vh] max-w-2xl flex flex-col rounded-2xl border shadow-[0_18px_60px_rgba(0,0,0,0.5)] overflow-hidden"
      [ngClass]="
        uiColors.border.subtleOpacity +
        ' ' +
        uiColors.background.surfaceElevated +
        ' bg-slate-900/95'
      "
    >
      <!-- Cabeçalho: título + Voltar (opcional) + Fechar -->
      <div
        class="flex items-center justify-between gap-4 shrink-0 px-6 py-4 border-b"
        [ngClass]="uiColors.border.subtleOpacity"
      >
        @if (title()) {
          <h2 id="modal-title" [ngClass]="uiTypography.heading.h3 + ' ' + uiColors.text.primary">
            {{ title() }}
          </h2>
        }
        <div class="flex items-center gap-2 ml-auto">
          @if (showBackButton()) {
            <button
              type="button"
              class="modal-back-btn flex h-10 items-center justify-center gap-1.5 rounded-xl border px-4 transition-all duration-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500 focus-visible:ring-offset-2 focus-visible:ring-offset-slate-900 text-sm font-semibold"
              [ngClass]="
                'border-emerald-500/50 text-emerald-300 hover:bg-emerald-500/20 hover:text-emerald-200 hover:border-emerald-400/60 hover:scale-105'
              "
              [attr.aria-label]="'Voltar'"
              (click)="backClicked.emit()"
            >
              Voltar
            </button>
          }
          <button
            type="button"
            class="modal-close-btn flex h-10 w-10 items-center justify-center rounded-xl border transition-all duration-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500 focus-visible:ring-offset-2 focus-visible:ring-offset-slate-900"
            [ngClass]="
              uiColors.border.subtleOpacity +
              ' text-slate-400 hover:text-slate-100 hover:border-slate-500 hover:scale-110'
            "
            [attr.aria-label]="'Fechar'"
            (click)="close()"
          >
            <span class="text-xl leading-none" aria-hidden="true">×</span>
          </button>
        </div>
      </div>

      <!-- Conteúdo: overflow-hidden para que o scroll fique no conteúdo interno -->
      <div class="flex-1 min-h-0 overflow-hidden flex flex-col">
        <ng-content />
      </div>
    </div>
  </div>
}
