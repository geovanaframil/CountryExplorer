<button
  [type]="type()"
  [disabled]="disabled()"
  [ngClass]="
    'inline-flex items-center justify-center gap-2 rounded-xl px-5 py-2.5 transition-all duration-200 disabled:opacity-50 disabled:pointer-events-none disabled:scale-100 ' +
    uiTypography.actions.primary +
    ' ' +
    variantClasses
  "
  (click)="clicked.emit()"
>
  <ng-content />
</button>
